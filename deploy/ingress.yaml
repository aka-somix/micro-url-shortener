apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: url-shortener
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
  tls:
    - hosts:
        - yourdomain.com
      secretName: web-tls
